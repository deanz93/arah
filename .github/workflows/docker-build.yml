name: Docker Build & Push

on:
  push:
    branches: [develop, master]
    paths:
      - 'services/api-gateway/**'
      - 'services/tile-server/**'
      - 'apps/web/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build (api-gateway|tile-server|web|all)'
        required: true
        default: 'all'

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      tile-server: ${{ steps.filter.outputs.tile-server }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'services/api-gateway/**'
            tile-server:
              - 'services/tile-server/**'
            web:
              - 'apps/web/**'

  build-api-gateway:
    needs: changes
    if: needs.changes.outputs.api-gateway == 'true' || github.event.inputs.service == 'api-gateway' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          BRANCH=${GITHUB_REF_NAME//\//-}
          echo "tag=${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          if [ "$GITHUB_REF_NAME" = "master" ]; then
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          else
            echo "latest_tag=develop" >> $GITHUB_OUTPUT
          fi

      - name: Build and push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: services/api-gateway
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/arah/api-gateway:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/arah/api-gateway:${{ steps.tag.outputs.latest_tag }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/arah/api-gateway:cache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/arah/api-gateway:cache,mode=max

      - name: Output image URI
        run: echo "IMAGE=${{ env.ECR_REGISTRY }}/arah/api-gateway:${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event.inputs.service == 'web' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          BRANCH=${GITHUB_REF_NAME//\//-}
          echo "tag=${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          if [ "$GITHUB_REF_NAME" = "master" ]; then
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          else
            echo "latest_tag=develop" >> $GITHUB_OUTPUT
          fi

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          tags: |
            ${{ env.ECR_REGISTRY }}/arah/web:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/arah/web:${{ steps.tag.outputs.latest_tag }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/arah/web:cache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/arah/web:cache,mode=max

  build-tile-server:
    needs: changes
    if: needs.changes.outputs.tile-server == 'true' || github.event.inputs.service == 'tile-server' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          BRANCH=${GITHUB_REF_NAME//\//-}
          echo "tag=${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          if [ "$GITHUB_REF_NAME" = "master" ]; then
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          else
            echo "latest_tag=develop" >> $GITHUB_OUTPUT
          fi

      - name: Build and push tile-server
        uses: docker/build-push-action@v6
        with:
          context: services/tile-server
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/arah/tile-server:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/arah/tile-server:${{ steps.tag.outputs.latest_tag }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/arah/tile-server:cache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/arah/tile-server:cache,mode=max
