apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: valhalla-hpa
  namespace: arah
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: valhalla
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
  behavior:
    scaleUp:
      # Valhalla takes ~30s to load tiles — scale up slowly to avoid thrashing
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
