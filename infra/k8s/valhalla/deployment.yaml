apiVersion: apps/v1
kind: Deployment
metadata:
  name: valhalla
  namespace: arah
  labels:
    app: valhalla
spec:
  replicas: 3
  selector:
    matchLabels:
      app: valhalla
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: valhalla
    spec:
      # Valhalla is RAM-heavy — schedule on memory-optimised nodes
      nodeSelector:
        node-type: memory-optimized
      containers:
        - name: valhalla
          image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
          ports:
            - containerPort: 8002
          env:
            - name: use_tiles_ignore_pbf
              value: "True"
            - name: serve_tiles
              value: "True"
          volumeMounts:
            - name: valhalla-tiles
              mountPath: /custom_files
          resources:
            requests:
              cpu: "1000m"
              memory: "5Gi"
            limits:
              cpu: "2000m"
              memory: "6Gi"
          livenessProbe:
            httpGet:
              path: /status
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /status
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: valhalla-tiles
          persistentVolumeClaim:
            claimName: valhalla-tiles-pvc
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: valhalla
