# DO NOT commit real secrets here — this is a template only.
# Use AWS Secrets Manager or kubectl create secret to manage secrets.
#
# Create secrets with:
#   kubectl create secret generic firebase-secrets \
#     --namespace=arah \
#     --from-literal=project-id=arah-app \
#     --from-literal=client-email=YOUR_EMAIL \
#     --from-literal=private-key="YOUR_KEY"
#
#   kubectl create secret generic app-secrets \
#     --namespace=arah \
#     --from-literal=hmac-secret=YOUR_HMAC_SECRET \
#     --from-literal=redis-url=redis://redis:6379 \
#     --from-literal=nominatim-password=YOUR_PASSWORD

apiVersion: v1
kind: Secret
metadata:
  name: firebase-secrets
  namespace: arah
type: Opaque
stringData:
  project-id: REPLACE_ME
  client-email: REPLACE_ME
  private-key: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: arah
type: Opaque
stringData:
  hmac-secret: REPLACE_ME
  redis-url: redis://redis:6379
  nominatim-password: REPLACE_ME
