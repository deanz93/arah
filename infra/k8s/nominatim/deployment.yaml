apiVersion: apps/v1
kind: Deployment
metadata:
  name: nominatim
  namespace: arah
  labels:
    app: nominatim
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nominatim
  template:
    metadata:
      labels:
        app: nominatim
    spec:
      containers:
        - name: nominatim
          image: mediagis/nominatim:4.4
          ports:
            - containerPort: 8080
          env:
            - name: NOMINATIM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: nominatim-password
            - name: REPLICATION_URL
              value: https://download.geofabrik.de/asia/malaysia-singapore-brunei-updates/
          volumeMounts:
            - name: nominatim-data
              mountPath: /var/lib/postgresql/14/main
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: nominatim-data
          persistentVolumeClaim:
            claimName: nominatim-data-pvc
