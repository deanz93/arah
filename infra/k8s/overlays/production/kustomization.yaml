apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: arah

resources:
  - ../../base

commonLabels:
  environment: production

# Production uses base replica counts (no downscaling patches)
configMapGenerator:
  - name: arah-env
    literals:
      - ENV=production
      - LOG_LEVEL=info
      - VALHALLA_URL=http://valhalla:8002
      - NOMINATIM_URL=http://nominatim:7070
      - TILE_SERVER_URL=http://tile-server:8080

images:
  - name: api-gateway
    newName: PLACEHOLDER_ECR/arah/api-gateway
    newTag: latest
  - name: tile-server
    newName: PLACEHOLDER_ECR/arah/tile-server
    newTag: latest
  - name: web
    newName: PLACEHOLDER_ECR/arah/web
    newTag: latest
