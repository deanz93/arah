apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: arah

resources:
  - ../../base

namePrefix: ""

commonLabels:
  environment: staging

# Patch: reduce replicas for staging cost savings
patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: valhalla
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: tile-server
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
  - target:
      kind: HorizontalPodAutoscaler
      name: valhalla
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

# ConfigMap with staging-specific env vars
configMapGenerator:
  - name: arah-env
    literals:
      - ENV=staging
      - LOG_LEVEL=debug
      - VALHALLA_URL=http://valhalla:8002
      - NOMINATIM_URL=http://nominatim:7070
      - TILE_SERVER_URL=http://tile-server:8080

images:
  - name: api-gateway
    newName: PLACEHOLDER_ECR/arah/api-gateway
    newTag: develop-latest
  - name: tile-server
    newName: PLACEHOLDER_ECR/arah/tile-server
    newTag: develop-latest
  - name: web
    newName: PLACEHOLDER_ECR/arah/web
    newTag: develop-latest
