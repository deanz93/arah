events { worker_connections 1024; }

http {
  upstream api        { server api-gateway:3001; }
  upstream tiles      { server tile-server:8080; }
  upstream routing    { server valhalla:8002; }
  upstream geocoding  { server nominatim:8080; }

  server {
    listen 80;
    server_name localhost arah.local;

    # API Gateway
    location /v1/ {
      proxy_pass http://api/v1/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Map tiles
    location /tiles/ {
      proxy_pass http://tiles/;
      proxy_cache_valid 200 7d;
      add_header Cache-Control "public, max-age=604800";
    }

    # Routing
    location /routing/ {
      proxy_pass http://routing/;
      proxy_set_header Host $host;
    }

    # Geocoding
    location /geocode/ {
      proxy_pass http://geocoding/;
      proxy_set_header Host $host;
    }

    # Health check
    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }
  }
}
