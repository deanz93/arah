controller:
  replicaCount: 3
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  config:
    use-real-ip: "true"
    proxy-read-timeout: "60"
    proxy-send-timeout: "60"
    keep-alive-requests: "10000"
    worker-processes: "auto"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
          topologyKey: kubernetes.io/hostname
