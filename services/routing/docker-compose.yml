services:
  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    container_name: arah-valhalla
    ports:
      - "8002:8002"
    volumes:
      - ./valhalla_tiles:/custom_files
      - ./valhalla.json:/valhalla.json
    environment:
      - tile_urls=https://download.geofabrik.de/asia/malaysia-singapore-brunei-latest.osm.pbf
      - build_elevation=False
      - build_admins=True
      - build_time_zones=True
      - use_tiles_ignore_pbf=False
      - force_rebuild=False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/status"]
      interval: 30s
      timeout: 10s
      retries: 5
