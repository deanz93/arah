services:
  tile-server:
    image: maptiler/tileserver-gl:latest
    container_name: arah-tiles
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./config.json:/data/config.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
